<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Solicitar Carrera</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="card">
            <h2>🚕 Solicitar Carrera</h2>

            <input id="origen" placeholder="Origen">
            <input id="destino" placeholder="Destino">

            <div id="map"></div>

            <div id="info" class="info">
                <p>📏 <span id="dist"></span></p>
                <p>⏱️ <span id="time"></span></p>
                <p>💰 $<span id="price"></span></p>
            </div>

            <button onclick="enviar()">Enviar por WhatsApp</button>
        </div>

        <!-- Scripts -->
        <script src="script.js"></script>
        <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBg4RnlXz7vmvsu_tm7jVUdQFA1y5kRqqU&libraries=places&callback=initMap"></script>
    </body>

</html>
