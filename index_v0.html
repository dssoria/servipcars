<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Solicitar Carrera</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="card">
            <h2>🚕 Solicitar Carrera</h2>

            <input id="origen" placeholder="¿Dónde te recogemos?">
            <input id="destino" placeholder="¿A dónde te vas?">

            <div id="map"></div>

            <div id="info" class="info">
                <p>📏 <span id="dist"></span></p>
                <p>⏱️ <span id="time"></span></p>
                <p>💰 $<span id="price"></span></p>
            </div>

            <button onclick="enviar()">Enviar por WhatsApp</button>
        </div>

        <!-- Scripts -->
        <script src="script.js"></script>
        <script async defer src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&libraries=places&callback=initMap"></script>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
